version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: taskmanager-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 231100
      POSTGRES_DB: taskmanager
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskmanager-api
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: 231100
      DB_NAME: taskmanager
      JWT_SECRET: electro_pi_backend_assessment_secure_secret_key_2026
      JWT_EXPIRES_IN: 1h
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
    driver: local
