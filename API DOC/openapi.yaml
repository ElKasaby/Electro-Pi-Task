openapi: 3.0.3
info:
  title: Project & Task Management System API
  description: A RESTful API built with Express, TypeScript, and TypeORM for managing projects and tasks, supporting authentication, RBAC, and pagination.
  version: 1.0.0
servers:
  - url: http://localhost:3000/api/v1
    description: Local Development Server
paths:
  /auth/register:
    post:
      summary: Register a new user
      description: Creates a new user in the system and returns an authentication JWT.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterInput'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid input or validation failed
        '409':
          description: Email already registered

  /auth/login:
    post:
      summary: Authenticate user & return token
      description: Logs in an existing user and returns a signed JWT.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInput'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid email or password

  /projects:
    post:
      summary: Create a new project
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectInput'
      responses:
        '201':
          description: Project created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectSingleResponse'
        '400':
          description: Validation error
        '401':
          description: Unauthorized - missing or invalid token

    get:
      summary: Get all projects for authenticated user
      description: Fetches a paginated list of projects. Member users see their own projects, Admins see all projects.
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          description: Page number for pagination (starts at 1)
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          description: Number of items per page (max 100)
          schema:
            type: integer
            default: 10
        - name: sortBy
          in: query
          description: Field name to sort by
          schema:
            type: string
            enum: [title, status, createdAt, updatedAt]
            default: createdAt
        - name: sortOrder
          in: query
          description: Sorting direction
          schema:
            type: string
            enum: [ASC, DESC]
            default: DESC
        - name: status
          in: query
          description: Filter projects by status
          schema:
            type: string
            enum: [planned, in_progress, completed]
      responses:
        '200':
          description: Projects list retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectListResponse'
        '401':
          description: Unauthorized

  /projects/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Unique project UUID
    get:
      summary: Get a single project by ID
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Project retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectSingleResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - not your project
        '404':
          description: Project not found

    patch:
      summary: Update project details
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectUpdateInput'
      responses:
        '200':
          description: Project updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectSingleResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Project not found

    delete:
      summary: Delete a project
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Project and associated tasks deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Project deleted successfully
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Project not found

  /projects/{projectId}/tasks:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Unique project UUID
    post:
      summary: Create a task under a specific project
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskInput'
      responses:
        '201':
          description: Task created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskSingleResponse'
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Project not found

    get:
      summary: Get all tasks for a specific project
      description: Fetches a paginated, filtered, and sorted list of tasks under the project.
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [title, status, priority, dueDate, createdAt, updatedAt]
            default: createdAt
        - name: sortOrder
          in: query
          schema:
            type: string
            enum: [ASC, DESC]
            default: DESC
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, in_progress, done]
        - name: priority
          in: query
          schema:
            type: string
            enum: [low, medium, high]
      responses:
        '200':
          description: Tasks list retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskListResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Project not found

  /tasks/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Unique task UUID
    get:
      summary: Get a single task by ID
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Task retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskSingleResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Task not found

    patch:
      summary: Update task details
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskUpdateInput'
      responses:
        '200':
          description: Task updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskSingleResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Task not found

    delete:
      summary: Delete a task
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Task deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Task deleted successfully
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Task not found

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    RegisterInput:
      type: object
      required:
        - name
        - email
        - password
      properties:
        name:
          type: string
          example: John Doe
        email:
          type: string
          format: email
          example: john@example.com
        password:
          type: string
          format: password
          example: SecurePass123
        role:
          type: string
          enum: [admin, member]
          example: member

    LoginInput:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: john@example.com
        password:
          type: string
          format: password
          example: SecurePass123

    AuthResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        data:
          type: object
          properties:
            user:
              type: object
              properties:
                id:
                  type: string
                  format: uuid
                name:
                  type: string
                email:
                  type: string
                role:
                  type: string
            token:
              type: string
              example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...

    ProjectInput:
      type: object
      required:
        - title
      properties:
        title:
          type: string
          example: New Portfolio
        description:
          type: string
          example: Creating my developer profile webpage.
        status:
          type: string
          enum: [planned, in_progress, completed]
          default: planned
          example: in_progress

    ProjectUpdateInput:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [planned, in_progress, completed]

    ProjectSingleResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        data:
          type: object
          properties:
            project:
              $ref: '#/components/schemas/ProjectModel'

    ProjectListResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        results:
          type: integer
          example: 1
        pagination:
          $ref: '#/components/schemas/PaginationMetadata'
        data:
          type: array
          items:
            $ref: '#/components/schemas/ProjectModel'

    ProjectModel:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        status:
          type: string
        userId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TaskInput:
      type: object
      required:
        - title
      properties:
        title:
          type: string
          example: Implement router
        description:
          type: string
          example: Create router file and link to controllers
        status:
          type: string
          enum: [pending, in_progress, done]
          default: pending
          example: pending
        priority:
          type: string
          enum: [low, medium, high]
          default: medium
          example: high
        dueDate:
          type: string
          format: date-time
          example: '2026-06-30T00:00:00.000Z'

    TaskUpdateInput:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [pending, in_progress, done]
        priority:
          type: string
          enum: [low, medium, high]
        dueDate:
          type: string
          format: date-time
          nullable: true

    TaskSingleResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        data:
          type: object
          properties:
            task:
              $ref: '#/components/schemas/TaskModel'

    TaskListResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        results:
          type: integer
          example: 1
        pagination:
          $ref: '#/components/schemas/PaginationMetadata'
        data:
          type: array
          items:
            $ref: '#/components/schemas/TaskModel'

    TaskModel:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        status:
          type: string
        priority:
          type: string
        dueDate:
          type: string
          format: date-time
          nullable: true
        projectId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PaginationMetadata:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 10
        totalPages:
          type: integer
          example: 1
        totalResults:
          type: integer
          example: 1
